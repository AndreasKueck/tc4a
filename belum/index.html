<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belum; alternativaj konstituantoj</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f9f9f9; 
        }
        h1 { color: #333; margin-bottom: 30px; }
        button { 
            font-size: 20px; 
            padding: 18px 40px; 
            margin: 20px; 
            background: #0066ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }
        button:hover { background: #0050cc; }
        #fallback { 
            margin-top: 40px; 
            text-align: left; 
            max-width: 700px; 
            margin-left: auto; 
            margin-right: auto;
            display: none; 
        }
        pre { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-size: 15px;
        }
        .success { color: green; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Belum; alternativaj konstituantoj </h1>
    
    <button id="copyBtn">📋 Kopii</button>
    
    <div id="status"></div>
    
    <div id="fallback">
        <p>Se automata kopiado ne funkciis, bonvole marku la tekston kaj kopiu ghin permane.</p>
        <pre id="textfeld"></pre>
    </div>

    <script>
        const meinText = `53.82435,9.038212,O1,8.258355,107.659963,1,-1,0,0,0,0,-1,Unspecified
53.82435,9.038212,P1,4.877284,1.715768,1,1,-2,0,0,0,-1,Unspecified
53.82435,9.038212,K1,5.721436,205.675855,1,1,0,0,0,0,1,Unspecified
53.82435,9.038212,MU2,11.543729,163.350502,2,-2,2,0,0,0,0,Unspecified
53.82435,9.038212,N2,30.760941,32.250993,2,-1,0,1,0,0,0,Unspecified
53.82435,9.038212,M2,99.046812,25.861512,2,0,0,0,0,0,0,Unspecified
53.82435,9.038212,S2,26.853029,113.279698,2,2,-2,0,0,0,0,Unspecified
53.82435,9.038212,K2,25.61486,89.778624,2,2,0,0,0,0,0,Unspecified
53.82435,9.038212,M4,8.986222,317.704652,4,0,0,0,0,0,0,Unspecified
53.82435,9.038212,MS4,8.284292,6.736021,4,2,-2,0,0,0,0,Unspecified`;

        const btn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');
        const textfeld = document.getElementById('textfeld');

        let copyErfolgreich = false;

        function kopieren() {
            navigator.clipboard.writeText(meinText).then(() => {
                erfolgMelden();
            }).catch(() => {
                fallbackKopieren();
            });
        }

        function fallbackKopieren() {
            const textarea = document.createElement("textarea");
            textarea.value = meinText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            erfolgMelden();
        }

        function erfolgMelden() {
            copyErfolgreich = true;
            status.innerHTML = '<p class="success">✅ Kopiita sukcese!</p>';
            
            setTimeout(() => {
                status.innerHTML = '';
            }, 2500);
        }

        // Button
        btn.addEventListener('click', kopieren);

        // Automatischer Versuch beim Laden
//        window.addEventListener('load', () => {
//            setTimeout(kopieren, 600);
//        });

        // Fallback nur anzeigen, wenn nach 5 Sekunden nichts geklappt hat
        setTimeout(() => {
            if (!copyErfolgreich) {
                textfeld.textContent = meinText;
                fallback.style.display = 'block';
            }
        }, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cape d'Or; alternativaj konstituantoj</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f9f9f9; 
        }
        h1 { color: #333; margin-bottom: 30px; }
        button { 
            font-size: 20px; 
            padding: 18px 40px; 
            margin: 20px; 
            background: #0066ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }
        button:hover { background: #0050cc; }
        #fallback { 
            margin-top: 40px; 
            text-align: left; 
            max-width: 700px; 
            margin-left: auto; 
            margin-right: auto;
            display: none; 
        }
        pre { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-size: 15px;
        }
        .success { color: green; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>caoe d'Or; alternativaj konstituantoj</h1>
    
    <button id="copyBtn">📋 Kopii</button>
    
    <div id="status"></div>
    
    <div id="fallback">
        <p>Se automata kopiado ne funkciis, bonvole marku la tekston kaj kopiu ghin permane.</p>
        <pre id="textfeld"></pre>
    </div>

    <script>
        const meinText = `45.3,-64.78,O1,12.199365,184.490318,1,-1,0,0,0,0,-1,Unspecified
45.3,-64.78,P1,11.201432,242.757592,1,1,-2,0,0,0,-1,Unspecified
45.3,-64.78,K1,18.97277,176.273538,1,1,0,0,0,0,1,Unspecified
45.3,-64.78,MU2,26.946642,225.486722,2,-2,2,0,0,0,0,Unspecified
45.3,-64.78,N2,72.752175,85.054101,2,-1,0,1,0,0,0,Unspecified
45.3,-64.78,M2,429.626429,101.23454,2,0,0,0,0,0,0,Unspecified
45.3,-64.78,S2,54.221052,143.35531,2,2,-2,0,0,0,0,Unspecified
45.3,-64.78,K2,56.552086,226.807812,2,2,0,0,0,0,0,Unspecified
45.3,-64.78,M4,10.513218,169.458514,4,0,0,0,0,0,0,Unspecified
45.3,-64.78,MS4,2.598229,219.387829,4,2,-2,0,0,0,0,Unspecified`;

        const btn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');
        const textfeld = document.getElementById('textfeld');

        let copyErfolgreich = false;

        function kopieren() {
            navigator.clipboard.writeText(meinText).then(() => {
                erfolgMelden();
            }).catch(() => {
                fallbackKopieren();
            });
        }

        function fallbackKopieren() {
            const textarea = document.createElement("textarea");
            textarea.value = meinText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            erfolgMelden();
        }

        function erfolgMelden() {
            copyErfolgreich = true;
            status.innerHTML = '<p class="success">✅ Kopiita sukcese!</p>';
            
            setTimeout(() => {
                status.innerHTML = '';
            }, 2500);
        }

        // Button
        btn.addEventListener('click', kopieren);

        // Automatischer Versuch beim Laden
  //      window.addEventListener('load', () => {
  //          setTimeout(kopieren, 600);
  //      });

        // Fallback nur anzeigen, wenn nach 5 Sekunden nichts geklappt hat
        setTimeout(() => {
            if (!copyErfolgreich) {
                textfeld.textContent = meinText;
                fallback.style.display = 'block';
            }
        }, 5000);
    </script>
</body>
</html>

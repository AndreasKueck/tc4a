<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hechthausen (maksimumoj); alternativaj konstituantoj</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f9f9f9; 
        }
        h1 { color: #333; margin-bottom: 30px; }
        button { 
            font-size: 20px; 
            padding: 18px 40px; 
            margin: 20px; 
            background: #0066ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }
        button:hover { background: #0050cc; }
        #fallback { 
            margin-top: 40px; 
            text-align: left; 
            max-width: 700px; 
            margin-left: auto; 
            margin-right: auto;
            display: none; 
        }
        pre { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-size: 15px;
        }
        .success { color: green; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Hechthausen (maksimumoj; alternativaj konstituantoj</h1>
    
    <button id="copyBtn">📋 Kopii</button>
    
    <div id="status"></div>
    
    <div id="fallback">
        <p>Se kopiado per la butono supre ne funkciis, bonvole marku la tekston kaj kopiu ghin permane.</p>
        <pre id="textfeld"></pre>
    </div>

    <script>
        const meinText = `53.642089,9.253883,O1,6.035379,325.719869,1,-1,0,0,0,0,-1,Unspecified
53.642089,9.253883,P1,2.376911,226.456491,1,1,-2,0,0,0,-1,Unspecified
53.642089,9.253883,K1,3.971476,91.694404,1,1,0,0,0,0,1,Unspecified
53.642089,9.253883,MU2,8.987621,172.06478,2,-2,2,0,0,0,0,Unspecified
53.642089,9.253883,N2,9.21196,45.084335,2,-1,0,1,0,0,0,Unspecified
53.642089,9.253883,M2,63.460009,79.099435,2,0,0,0,0,0,0,Unspecified
53.642089,9.253883,S2,18.530525,149.477904,2,2,-2,0,0,0,0,Unspecified
53.642089,9.253883,K2,19.36705,164.1502,2,2,0,0,0,0,0,Unspecified
53.642089,9.253883,M4,10.343322,76.744359,4,0,0,0,0,0,0,Unspecified
53.642089,9.253883,MS4,7.691177,142.074554,4,2,-2,0,0,0,0,Unspecified`;

        const btn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');
        const textfeld = document.getElementById('textfeld');

        let copyErfolgreich = false;

        function kopieren() {
            navigator.clipboard.writeText(meinText).then(() => {
                erfolgMelden();
            }).catch(() => {
                fallbackKopieren();
            });
        }

        function fallbackKopieren() {
            const textarea = document.createElement("textarea");
            textarea.value = meinText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            erfolgMelden();
        }

        function erfolgMelden() {
            copyErfolgreich = true;
            status.innerHTML = '<p class="success">✅ Kopiita sukcese!</p>';
            
            setTimeout(() => {
                status.innerHTML = '';
            }, 2500);
        }

        // Button
        btn.addEventListener('click', kopieren);

        // Automatischer Versuch beim Laden
//        window.addEventListener('load', () => {
//            setTimeout(kopieren, 600);
//        });

        // Fallback nur anzeigen, wenn nach 7 Sekunden nichts geklappt hat
        setTimeout(() => {
            if (!copyErfolgreich) {
                textfeld.textContent = meinText;
                fallback.style.display = 'block';
            }
        }, 7000);
    </script>
</body>
</html>

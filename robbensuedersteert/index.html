    <title>Robbensuedersteert; alternativaj konstituantoj</title>

            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f9f9f9; 
        }
        h1 { color: #333; margin-bottom: 30px; }
        button { 
            font-size: 20px; 
            padding: 18px 40px; 
            margin: 20px; 
            background: #0066ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }
        button:hover { background: #0050cc; }
        #fallback { 
            margin-top: 40px; 
            text-align: left; 
            max-width: 700px; 
            margin-left: auto; 
            margin-right: auto;
            display: none; 
        }
        pre { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            font-size: 15px;
        }
        .success { color: green; font-weight: bold; margin: 15px 0; }
    </style>
</head>

    </div>

        const btn = document.getElementById('copyBtn');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');
        const textfeld = document.getElementById('textfeld');

        let copyErfolgreich = false;

        function kopieren() {
            navigator.clipboard.writeText(meinText).then(() => {
                erfolgMelden();
            }).catch(() => {
                fallbackKopieren();
            });
        }

        function fallbackKopieren() {
            const textarea = document.createElement("textarea");
            textarea.value = meinText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            erfolgMelden();
        }

        function erfolgMelden() {
            copyErfolgreich = true;
            status.innerHTML = '<p class="success">✅ Kopiita sukcese!</p>';
            
            setTimeout(() => {
                status.innerHTML = '';
            }, 2500);
        }

        // Button
        btn.addEventListener('click', kopieren);

        // Automatischer Versuch beim Laden
        window.addEventListener('load', () => {
            setTimeout(kopieren, 600);
        });

        // Fallback nur anzeigen, wenn nach 3 Sekunden nichts geklappt hat
        setTimeout(() => {
            if (!copyErfolgreich) {
                textfeld.textContent = meinText;
                fallback.style.display = 'block';
            }
        }, 3000);
    </script>
</body>
</html>
